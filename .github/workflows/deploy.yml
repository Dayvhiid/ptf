name: Deploy Portfolio to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          cat > .env << EOF
          VITE_APP_EMAILJS_SERVICE_ID=${{ secrets.VITE_APP_EMAILJS_SERVICE_ID }}
          VITE_APP_EMAILJS_TEMPLATE_ID=${{ secrets.VITE_APP_EMAILJS_TEMPLATE_ID }}
          VITE_APP_EMAILJS_PUBLIC_KEY=${{ secrets.VITE_APP_EMAILJS_PUBLIC_KEY }}
          EOF

      - name: Build project
        run: npm run build

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/aws.pem
          chmod 600 ~/.ssh/aws.pem
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files to VPS
        run: |
          ssh -i ~/.ssh/aws.pem -p "${{ secrets.VPS_PORT }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p /home/ec2-user/ptf"

          rsync -az --delete \
            -e "ssh -i ~/.ssh/aws.pem -p ${{ secrets.VPS_PORT }}" \
            dist/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/ec2-user/ptf/dist/"

          rsync -az --delete \
            -e "ssh -i ~/.ssh/aws.pem -p ${{ secrets.VPS_PORT }}" \
            nginx.conf \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/ec2-user/ptf/nginx.conf"

      - name: Restart container
        run: |
          ssh -i ~/.ssh/aws.pem \
            -p "${{ secrets.VPS_PORT }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'

          cd /home/ec2-user/ptf

          docker rm -f 3dfolio-app || true

          docker run -d \
            --name 3dfolio-app \
            --restart unless-stopped \
            -p 80:80 \
            -v /home/ec2-user/ptf/dist:/usr/share/nginx/html:ro \
            -v /home/ec2-user/ptf/nginx.conf:/etc/nginx/conf.d/default.conf:ro \
            nginx:1.27-alpine

          EOF