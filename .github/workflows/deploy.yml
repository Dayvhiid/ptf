name: Deploy Portfolio to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ✅ IMPORTANT: Create .env BEFORE build (Vite needs this at build time)
      - name: Create .env file
        run: |
          cat > .env << EOF
          VITE_APP_EMAILJS_SERVICE_ID=${{ secrets.VITE_APP_EMAILJS_SERVICE_ID }}
          VITE_APP_EMAILJS_TEMPLATE_ID=${{ secrets.VITE_APP_EMAILJS_TEMPLATE_ID }}
          VITE_APP_EMAILJS_PUBLIC_KEY=${{ secrets.VITE_APP_EMAILJS_PUBLIC_KEY }}
          EOF

      - name: Build production assets
        run: npm run build

      - name: Prepare SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$VPS_SSH_KEY" | tr -d '\r' > ~/.ssh/aws.pem
          chmod 600 ~/.ssh/aws.pem
          ssh-keygen -lf ~/.ssh/aws.pem

      - name: Create VPS directory
        run: |
          ssh -i ~/.ssh/aws.pem \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -p "${{ secrets.VPS_PORT }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p '${{ secrets.VPS_PATH }}'"

      - name: Sync build files to VPS
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/aws.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p ${{ secrets.VPS_PORT }}" \
            dist/ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/dist/"

          rsync -az \
            -e "ssh -i ~/.ssh/aws.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p ${{ secrets.VPS_PORT }}" \
            nginx.conf "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/nginx.conf"

      
      - name: Restart Nginx container on VPS
        run: |
          ssh -i ~/.ssh/aws.pem \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -p "${{ secrets.VPS_PORT }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << EOF

          VPS_PATH="${{ secrets.VPS_PATH }}"

          cd "$VPS_PATH"

          docker rm -f 3dfolio-app >/dev/null 2>&1 || true

          docker run -d \
            --name 3dfolio-app \
            --restart unless-stopped \
            -p 80:80 \
            -v "$VPS_PATH/dist:/usr/share/nginx/html:ro" \
            -v "$VPS_PATH/nginx.conf:/etc/nginx/conf.d/default.conf:ro" \
            nginx:1.27-alpine

        EOF