name: Deploy Portfolio to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production assets
        run: npm run build

      - name: Prepare SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$VPS_SSH_KEY" | tr -d '\r' > ~/.ssh/aws.pem
          chmod 600 ~/.ssh/aws.pem
          ssh-keygen -lf ~/.ssh/aws.pem
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Create target directory on VPS
        run: |
          ssh -i ~/.ssh/aws.pem \
            -p "${{ secrets.VPS_PORT }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p '${{ secrets.VPS_PATH }}'"

      - name: Sync project files to VPS
        run: |
          ssh -i ~/.ssh/aws.pem \
            -p "${{ secrets.VPS_PORT }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p '${{ secrets.VPS_PATH }}/dist'"

          rsync -az --delete \
            -e "ssh -i ~/.ssh/aws.pem -p ${{ secrets.VPS_PORT }}" \
            dist/ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/dist/"

          rsync -az --delete \
            -e "ssh -i ~/.ssh/aws.pem -p ${{ secrets.VPS_PORT }}" \
            nginx.conf "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/nginx.conf"

      - name: Restart static site container on VPS
        run: |
          ssh -i ~/.ssh/aws.pem \
            -p "${{ secrets.VPS_PORT }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << EOF
          cd "${{ secrets.VPS_PATH }}"
          docker rm -f 3dfolio-app >/dev/null 2>&1 || true
          docker run -d \
            --name 3dfolio-app \
            --restart unless-stopped \
            -p 80:80 \
            -v "${{ secrets.VPS_PATH }}/dist:/usr/share/nginx/html:ro" \
            -v "${{ secrets.VPS_PATH }}/nginx.conf:/etc/nginx/conf.d/default.conf:ro" \
            nginx:1.27-alpine
          EOF